<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل الدخول – SafeRoad Libya</title>
  <style>
/* =============================================
   SafeRoad Libya - style.css
   تصميم احترافي - داكن + أخضر + أبيض
   ============================================= */

/* === الخطوط === */
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=Tajawal:wght@300;400;500;700;800&display=swap');

/* === متغيرات الألوان === */
:root {
  --bg-primary:    #0a0e1a;
  --bg-secondary:  #0f1629;
  --bg-card:       #141c2e;
  --bg-card-hover: #1a2540;
  --green-main:    #00e676;
  --green-dark:    #00b248;
  --green-glow:    rgba(0, 230, 118, 0.18);
  --green-subtle:  rgba(0, 230, 118, 0.08);
  --accent-red:    #ff4b4b;
  --accent-yellow: #ffd740;
  --accent-gray:   #9e9e9e;
  --text-primary:  #e8eaf6;
  --text-secondary:#9ea8c2;
  --text-muted:    #5c6882;
  --border:        rgba(255,255,255,0.07);
  --border-green:  rgba(0, 230, 118, 0.3);
  --shadow-card:   0 8px 32px rgba(0,0,0,0.4);
  --shadow-green:  0 0 30px rgba(0, 230, 118, 0.2);
  --radius:        14px;
  --radius-sm:     8px;
  --transition:    all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

/* === إعادة تعيين === */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  scroll-behavior: smooth;
  font-size: 16px;
}

body {
  font-family: 'Cairo', 'Tajawal', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  direction: rtl;
  text-align: right;
  line-height: 1.7;
  overflow-x: hidden;
  opacity: 0;
  transition: opacity 0.4s ease;
}

a { text-decoration: none; color: inherit; transition: var(--transition); }
ul, ol { list-style: none; }
img { max-width: 100%; display: block; }
button { cursor: pointer; font-family: inherit; border: none; outline: none; }
input, textarea, select { font-family: inherit; direction: rtl; }

/* === شريط التمرير === */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-primary); }
::-webkit-scrollbar-thumb { background: var(--green-dark); border-radius: 3px; }

/* =============================================
   NAVBAR
   ============================================= */
.navbar {
  position: fixed;
  top: 0; right: 0; left: 0;
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 2.5rem;
  height: 70px;
  background: rgba(10, 14, 26, 0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  transition: var(--transition);
}

.navbar.scrolled {
  background: rgba(10, 14, 26, 0.98);
  box-shadow: 0 4px 30px rgba(0,0,0,0.5);
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 1.4rem;
  font-weight: 800;
  color: var(--text-primary);
}

.nav-logo .logo-icon {
  width: 38px; height: 38px;
  background: linear-gradient(135deg, var(--green-main), var(--green-dark));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem;
  box-shadow: var(--shadow-green);
}

.nav-logo span { color: var(--green-main); }

.nav-links {
  display: flex;
  align-items: center;
  gap: 0.3rem;
}

.nav-links a {
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  font-size: 0.92rem;
  font-weight: 500;
  color: var(--text-secondary);
  transition: var(--transition);
  position: relative;
}

.nav-links a:hover,
.nav-links a.active {
  color: var(--green-main);
  background: var(--green-subtle);
}

.nav-links a.active::after {
  content: '';
  position: absolute;
  bottom: 4px; left: 50%; transform: translateX(-50%);
  width: 4px; height: 4px;
  background: var(--green-main);
  border-radius: 50%;
}

.nav-actions {
  display: flex;
  align-items: center;
  gap: 12px;
}

.btn-nav-login {
  padding: 9px 22px;
  border-radius: 50px;
  background: transparent;
  border: 1px solid var(--border-green);
  color: var(--green-main);
  font-size: 0.88rem;
  font-weight: 600;
  transition: var(--transition);
}

.btn-nav-login:hover {
  background: var(--green-subtle);
  box-shadow: var(--shadow-green);
}

/* Mobile Menu Button */
.hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  background: none;
  border: none;
  padding: 6px;
  cursor: pointer;
}

.hamburger span {
  width: 24px; height: 2px;
  background: var(--text-primary);
  border-radius: 2px;
  transition: var(--transition);
  display: block;
}

.hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.hamburger.open span:nth-child(2) { opacity: 0; }
.hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

.mobile-menu {
  display: none;
  position: fixed;
  top: 70px; right: 0; left: 0;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  padding: 1.5rem;
  z-index: 999;
  flex-direction: column;
  gap: 8px;
  animation: slideDown 0.3s ease;
}

.mobile-menu.open { display: flex; }

.mobile-menu a {
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  font-size: 1rem;
  font-weight: 500;
  color: var(--text-secondary);
  border-bottom: 1px solid var(--border);
  transition: var(--transition);
}

.mobile-menu a:last-child { border-bottom: none; }
.mobile-menu a:hover, .mobile-menu a.active { color: var(--green-main); background: var(--green-subtle); }

@keyframes slideDown {
  from { opacity: 0; transform: translateY(-10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* =============================================
   BUTTONS
   ============================================= */
.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 13px 28px;
  background: linear-gradient(135deg, var(--green-main), var(--green-dark));
  color: #0a0e1a;
  border-radius: 50px;
  font-weight: 700;
  font-size: 0.95rem;
  border: none;
  transition: var(--transition);
  box-shadow: 0 4px 20px rgba(0, 230, 118, 0.3);
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(0, 230, 118, 0.45);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 12px 26px;
  background: transparent;
  color: var(--text-primary);
  border-radius: 50px;
  font-weight: 600;
  font-size: 0.95rem;
  border: 1px solid var(--border);
  transition: var(--transition);
}

.btn-secondary:hover {
  border-color: var(--green-main);
  color: var(--green-main);
  background: var(--green-subtle);
}

.btn-outline-green {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 22px;
  background: transparent;
  color: var(--green-main);
  border-radius: var(--radius-sm);
  font-weight: 600;
  font-size: 0.88rem;
  border: 1px solid var(--border-green);
  transition: var(--transition);
}

.btn-outline-green:hover {
  background: var(--green-subtle);
  box-shadow: var(--shadow-green);
}

/* =============================================
   CARDS
   ============================================= */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.5rem;
  transition: var(--transition);
  position: relative;
  overflow: hidden;
}

.card:hover {
  border-color: var(--border-green);
  box-shadow: var(--shadow-card);
  transform: translateY(-3px);
}

.card::before {
  content: '';
  position: absolute;
  top: 0; right: 0; left: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--green-main), transparent);
  opacity: 0;
  transition: var(--transition);
}

.card:hover::before { opacity: 1; }

/* =============================================
   BADGES / STATUS
   ============================================= */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 12px;
  border-radius: 50px;
  font-size: 0.78rem;
  font-weight: 600;
}

.badge-safe    { background: rgba(0,230,118,0.15); color: var(--green-main); }
.badge-danger  { background: rgba(255,75,75,0.15);  color: var(--accent-red); }
.badge-warning { background: rgba(255,215,64,0.15); color: var(--accent-yellow); }
.badge-closed  { background: rgba(158,158,158,0.15);color: var(--accent-gray); }

.status-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  display: inline-block;
}
.status-dot.safe    { background: var(--green-main); box-shadow: 0 0 6px var(--green-main); animation: pulse-green 2s infinite; }
.status-dot.danger  { background: var(--accent-red); box-shadow: 0 0 6px var(--accent-red); animation: pulse-red 2s infinite; }
.status-dot.warning { background: var(--accent-yellow); }
.status-dot.closed  { background: var(--accent-gray); }

@keyframes pulse-green {
  0%, 100% { box-shadow: 0 0 6px var(--green-main); }
  50%       { box-shadow: 0 0 14px var(--green-main); }
}
@keyframes pulse-red {
  0%, 100% { box-shadow: 0 0 6px var(--accent-red); }
  50%       { box-shadow: 0 0 14px var(--accent-red); }
}

/* =============================================
   SECTION TITLES
   ============================================= */
.section-label {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 6px 14px;
  background: var(--green-subtle);
  border: 1px solid var(--border-green);
  border-radius: 50px;
  color: var(--green-main);
  font-size: 0.82rem;
  font-weight: 600;
  margin-bottom: 1.2rem;
}

.section-title {
  font-size: clamp(1.6rem, 3vw, 2.4rem);
  font-weight: 800;
  color: var(--text-primary);
  line-height: 1.3;
  margin-bottom: 0.8rem;
}

.section-title span { color: var(--green-main); }

.section-desc {
  color: var(--text-secondary);
  font-size: 1rem;
  max-width: 560px;
  margin-bottom: 2.5rem;
}

/* =============================================
   FORMS & INPUTS
   ============================================= */
.form-group {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 1.2rem;
}

.form-group label {
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--text-secondary);
}

.form-control {
  padding: 13px 16px;
  background: var(--bg-primary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-size: 0.95rem;
  transition: var(--transition);
  width: 100%;
}

.form-control:focus {
  border-color: var(--green-main);
  outline: none;
  box-shadow: 0 0 0 3px var(--green-glow);
}

.form-control::placeholder { color: var(--text-muted); }

select.form-control option { background: var(--bg-secondary); }

/* =============================================
   FOOTER
   ============================================= */
.footer {
  background: var(--bg-secondary);
  border-top: 1px solid var(--border);
  padding: 3rem 2.5rem 1.5rem;
}

.footer-grid {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1fr;
  gap: 3rem;
  margin-bottom: 2rem;
}

.footer-brand .nav-logo { margin-bottom: 1rem; font-size: 1.2rem; }
.footer-brand p { color: var(--text-muted); font-size: 0.88rem; line-height: 1.8; max-width: 260px; }

.footer-col h4 {
  font-size: 0.88rem;
  font-weight: 700;
  color: var(--green-main);
  margin-bottom: 1.2rem;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.footer-col ul { display: flex; flex-direction: column; gap: 8px; }
.footer-col ul a { color: var(--text-muted); font-size: 0.88rem; transition: var(--transition); }
.footer-col ul a:hover { color: var(--green-main); padding-right: 6px; }

.footer-bottom {
  border-top: 1px solid var(--border);
  padding-top: 1.2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  color: var(--text-muted);
  font-size: 0.82rem;
}

.footer-bottom span { color: var(--green-main); }

.social-links { display: flex; gap: 10px; }
.social-link {
  width: 34px; height: 34px;
  border-radius: 8px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  color: var(--text-muted);
  font-size: 0.9rem;
  transition: var(--transition);
}
.social-link:hover { border-color: var(--green-main); color: var(--green-main); }

/* =============================================
   HERO - index.html
   ============================================= */
.hero {
  min-height: 100vh;
  display: flex;
  align-items: center;
  position: relative;
  padding: 100px 2.5rem 4rem;
  overflow: hidden;
}

.hero-bg {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(0,230,118,0.12), transparent),
    radial-gradient(ellipse 60% 60% at 80% 100%, rgba(0,178,72,0.08), transparent),
    linear-gradient(180deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
}

.hero-grid-lines {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size: 50px 50px;
}

.hero-content {
  position: relative;
  z-index: 2;
  max-width: 680px;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 7px 16px;
  background: var(--green-subtle);
  border: 1px solid var(--border-green);
  border-radius: 50px;
  color: var(--green-main);
  font-size: 0.83rem;
  font-weight: 600;
  margin-bottom: 1.5rem;
  animation: fadeInDown 0.6s ease both;
}

.hero-badge .dot { width: 6px; height: 6px; background: var(--green-main); border-radius: 50%; animation: pulse-green 1.5s infinite; }

.hero h1 {
  font-size: clamp(2.2rem, 5vw, 3.8rem);
  font-weight: 900;
  line-height: 1.2;
  margin-bottom: 1.2rem;
  animation: fadeInUp 0.7s ease 0.1s both;
}

.hero h1 .highlight {
  background: linear-gradient(135deg, var(--green-main), #69f0ae);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero p {
  font-size: 1.1rem;
  color: var(--text-secondary);
  margin-bottom: 2rem;
  animation: fadeInUp 0.7s ease 0.2s both;
  max-width: 540px;
}

.hero-actions {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  animation: fadeInUp 0.7s ease 0.3s both;
  margin-bottom: 2.5rem;
}

.hero-stats {
  display: flex;
  gap: 2rem;
  animation: fadeInUp 0.7s ease 0.4s both;
}

.hero-stat .num {
  font-size: 1.8rem;
  font-weight: 800;
  color: var(--green-main);
  line-height: 1;
}

.hero-stat .lbl {
  font-size: 0.8rem;
  color: var(--text-muted);
  margin-top: 3px;
}

/* Floating cards */
.hero-visual {
  position: absolute;
  left: 4%;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  gap: 14px;
  z-index: 2;
  animation: fadeInLeft 0.8s ease 0.5s both;
}

.float-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem 1.2rem;
  min-width: 200px;
  display: flex;
  align-items: center;
  gap: 12px;
  animation: float 4s ease-in-out infinite;
  backdrop-filter: blur(10px);
}

.float-card:nth-child(2) { animation-delay: 1s; margin-right: 20px; }
.float-card:nth-child(3) { animation-delay: 2s; }

.float-card .icon {
  width: 40px; height: 40px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem;
  flex-shrink: 0;
}

.float-card .info { flex: 1; }
.float-card .info .title { font-size: 0.8rem; color: var(--text-muted); }
.float-card .info .value { font-size: 1rem; font-weight: 700; }

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50%       { transform: translateY(-8px); }
}

/* =============================================
   SEARCH SECTION - index.html
   ============================================= */
.search-section {
  padding: 0 2.5rem 4rem;
  position: relative;
  z-index: 2;
}

.search-box {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 2rem;
  max-width: 800px;
  margin: 0 auto;
  box-shadow: var(--shadow-card);
  position: relative;
  top: -30px;
}

.search-box h3 {
  font-size: 1.1rem;
  font-weight: 700;
  margin-bottom: 1.2rem;
  color: var(--text-primary);
}

.search-row {
  display: grid;
  grid-template-columns: 1fr 1fr auto;
  gap: 12px;
  align-items: end;
}

.search-row .btn-primary { white-space: nowrap; height: 48px; }

/* =============================================
   STATUS CARDS SECTION
   ============================================= */
.status-section {
  padding: 3rem 2.5rem;
  background: var(--bg-secondary);
}

.status-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1.2rem;
  margin-top: 2rem;
}

.status-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.5rem;
  transition: var(--transition);
  cursor: pointer;
  position: relative;
  overflow: hidden;
}

.status-card::after {
  content: '';
  position: absolute;
  bottom: 0; right: 0; left: 0;
  height: 3px;
  border-radius: 0 0 var(--radius) var(--radius);
  transition: var(--transition);
}

.status-card.safe::after   { background: var(--green-main); }
.status-card.danger::after { background: var(--accent-red); }
.status-card.warn::after   { background: var(--accent-yellow); }
.status-card.closed::after { background: var(--accent-gray); }

.status-card:hover { transform: translateY(-4px); border-color: rgba(255,255,255,0.15); }

.status-card .sc-icon {
  width: 50px; height: 50px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.3rem;
  margin-bottom: 1rem;
}

.status-card.safe   .sc-icon { background: rgba(0,230,118,0.1);  color: var(--green-main); }
.status-card.danger .sc-icon { background: rgba(255,75,75,0.1);  color: var(--accent-red); }
.status-card.warn   .sc-icon { background: rgba(255,215,64,0.1); color: var(--accent-yellow); }
.status-card.closed .sc-icon { background: rgba(158,158,158,0.1);color: var(--accent-gray); }

.status-card .sc-num {
  font-size: 2.4rem;
  font-weight: 900;
  line-height: 1;
  margin-bottom: 4px;
}

.status-card.safe   .sc-num { color: var(--green-main); }
.status-card.danger .sc-num { color: var(--accent-red); }
.status-card.warn   .sc-num { color: var(--accent-yellow); }
.status-card.closed .sc-num { color: var(--accent-gray); }

.status-card .sc-label { font-size: 0.9rem; color: var(--text-secondary); font-weight: 500; }
.status-card .sc-sub   { font-size: 0.78rem; color: var(--text-muted); margin-top: 6px; }

/* =============================================
   FEATURED ROADS - index.html
   ============================================= */
.roads-section { padding: 4rem 2.5rem; }

.roads-list { display: flex; flex-direction: column; gap: 1rem; }

.road-item {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.2rem 1.5rem;
  display: flex;
  align-items: center;
  gap: 1.2rem;
  transition: var(--transition);
}

.road-item:hover { border-color: var(--border-green); transform: translateX(-4px); }

.road-item .road-num {
  width: 42px; height: 42px;
  background: var(--bg-primary);
  border: 1px solid var(--border);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.8rem;
  font-weight: 700;
  color: var(--text-muted);
  flex-shrink: 0;
}

.road-item .road-info { flex: 1; }
.road-item .road-name { font-weight: 700; font-size: 1rem; color: var(--text-primary); }
.road-item .road-cities { font-size: 0.83rem; color: var(--text-muted); margin-top: 2px; }

.road-item .road-meta {
  display: flex;
  align-items: center;
  gap: 1rem;
  flex-shrink: 0;
}

.road-item .road-dist { font-size: 0.85rem; color: var(--text-secondary); }
.road-item .road-time { font-size: 0.85rem; color: var(--text-muted); }

/* =============================================
   STATISTICS - index.html
   ============================================= */
.stats-section {
  padding: 4rem 2.5rem;
  background: var(--bg-secondary);
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 2rem;
  text-align: center;
}

.stat-item { padding: 1.5rem; }
.stat-item .num {
  font-size: clamp(2rem, 4vw, 3rem);
  font-weight: 900;
  color: var(--green-main);
  line-height: 1;
  display: block;
}

    /* الشريط العلوي (بدل الـ navbar الكامل) */
    .login-topbar {
      position: fixed;
      top: 0; right: 0; left: 0;
      z-index: 100;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;

    /* تبديل بين تسجيل الدخول والتسجيل */
    .auth-tabs {
      display: flex;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 4px;
      margin-bottom: 1.8rem;

    .auth-tab {
      flex: 1;

    .auth-tab.active {
      background: linear-gradient(135deg, var(--green-main), var(--green-dark));

    }

    /* حقول الإدخال */
    .input-with-icon {
      position: relative;
    }

    .input-with-icon .input-icon {
      position: absolute;

      top: 50%;
      transform: translateY(-50%);

    /* مؤشر قوة كلمة المرور */

  <script>
/* =============================================
   SafeRoad Libya - script.js
   ============================================= */

document.addEventListener('DOMContentLoaded', () => {

  /* ==========================================
     NAVBAR - SCROLL & MOBILE MENU
     ========================================== */
  const navbar   = document.querySelector('.navbar');
  const hamburger = document.querySelector('.hamburger');
  const mobileMenu = document.querySelector('.mobile-menu');

  // تغيير الـ navbar عند التمرير
  window.addEventListener('scroll', () => {
    if (navbar) {
      navbar.classList.toggle('scrolled', window.scrollY > 30);
    }
  });

  // قائمة الهاتف
  if (hamburger && mobileMenu) {
    hamburger.addEventListener('click', () => {
      hamburger.classList.toggle('open');
      mobileMenu.classList.toggle('open');
    });

    // إغلاق القائمة عند النقر على رابط
    mobileMenu.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        hamburger.classList.remove('open');
        mobileMenu.classList.remove('open');
      });
    });
  }

  /* ==========================================
     تمييز الرابط النشط
     ========================================== */
  const currentPage = window.location.pathname.split('/').pop() || 'index.html';
  document.querySelectorAll('.nav-links a, .mobile-menu a').forEach(link => {
    const href = link.getAttribute('href');
    if (href === currentPage || (currentPage === '' && href === 'index.html')) {
      link.classList.add('active');
    }
  });

  /* ==========================================
     ANIMATIONS ON SCROLL
     ========================================== */
  const observeElements = () => {
    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry, i) => {
        if (entry.isIntersecting) {
          setTimeout(() => {
            entry.target.classList.add('visible');
          }, i * 80);
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1 });

    document.querySelectorAll('.animate-in').forEach(el => observer.observe(el));
  };

  observeElements();

  /* ==========================================
     عداد الأرقام
     ========================================== */
  const animateCounters = () => {
    document.querySelectorAll('[data-count]').forEach(el => {
      const target = parseInt(el.dataset.count);
      const duration = 1800;
      const step = target / (duration / 16);
      let current = 0;

      const timer = setInterval(() => {
        current += step;
        if (current >= target) {
          el.textContent = target.toLocaleString('ar-LY');
          clearInterval(timer);
        } else {
          el.textContent = Math.floor(current).toLocaleString('ar-LY');
        }
      }, 16);
    });
  };

  // تشغيل العداد عند الظهور
  const counterObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        animateCounters();
        counterObserver.disconnect();
      }
    });
  }, { threshold: 0.3 });

  const statsSection = document.querySelector('.stats-section, .dashboard-grid');
  if (statsSection) counterObserver.observe(statsSection);

  /* ==========================================
     MODAL - إضافة بلاغ
     ========================================== */
  const fab = document.querySelector('.fab');
  const modalOverlay = document.querySelector('.modal-overlay');
  const modalClose = document.querySelector('.modal-close');
  const cancelBtn = document.querySelector('.modal-cancel');

  const openModal = () => {
    if (modalOverlay) {
      modalOverlay.classList.add('open');
      document.body.style.overflow = 'hidden';
    }
  };

  const closeModal = () => {
    if (modalOverlay) {
      modalOverlay.classList.remove('open');
      document.body.style.overflow = '';
    }
  };

  if (fab) fab.addEventListener('click', openModal);
  if (modalClose) modalClose.addEventListener('click', closeModal);
  if (cancelBtn) cancelBtn.addEventListener('click', closeModal);
  if (modalOverlay) {
    modalOverlay.addEventListener('click', (e) => {
      if (e.target === modalOverlay) closeModal();
    });
  }

  /* ==========================================
     فلترة البلاغات
     ========================================== */
  const filterBtns = document.querySelectorAll('.filter-btn');
  const reportCards = document.querySelectorAll('.report-card');

  filterBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      filterBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      const type = btn.dataset.filter;
      reportCards.forEach(card => {
        if (type === 'all' || card.classList.contains(type)) {
          card.style.display = 'flex';
          card.style.animation = 'fadeIn 0.3s ease';
        } else {
          card.style.display = 'none';
        }
      });
    });
  });

  /* ==========================================
     بحث الطرق
     ========================================== */
  const searchBtn = document.querySelector('.btn-search-road');
  const resultsContainer = document.querySelector('.search-results');

  // بيانات وهمية للطرق
  const roadsData = [
    {
      from: 'طرابلس', to: 'مصراتة',
      distance: '210 كم', time: '2.5 ساعة',
      status: 'safe', statusText: 'آمن',
      via: 'الطريق الساحلي'
    },
    {
      from: 'طرابلس', to: 'الزاوية',
      distance: '42 كم', time: '45 دقيقة',
      status: 'warning', statusText: 'ازدحام',
      via: 'الطريق الدائري'
    },
    {
      from: 'مصراتة', to: 'سرت',
      distance: '280 كم', time: '3 ساعات',
      status: 'safe', statusText: 'آمن',
      via: 'الطريق الساحلي'
    },
    {
      from: 'بنغازي', to: 'البيضاء',
      distance: '220 كم', time: '2.5 ساعة',
      status: 'danger', statusText: 'حادث',
      via: 'الطريق الجبلي'
    },
    {
      from: 'طرابلس', to: 'بنغازي',
      distance: '1050 كم', time: '11 ساعة',
      status: 'warning', statusText: 'ازدحام في بعض المقاطع',
      via: 'الطريق الساحلي الرئيسي'
    },
    {
      from: 'سبها', to: 'ترهونة',
      distance: '680 كم', time: '7 ساعات',
      status: 'closed', statusText: 'مغلق جزئياً',
      via: 'الطريق الصحراوي'
    }
  ];

  if (searchBtn) {
    searchBtn.addEventListener('click', () => {
      const fromVal = document.querySelector('#from-city')?.value?.trim() || '';
      const toVal   = document.querySelector('#to-city')?.value?.trim() || '';

      if (!fromVal || !toVal) {
        showToast('⚠️ يرجى تحديد مدينة الانطلاق والوجهة', 'warning');
        return;
      }

      // محاكاة تحميل
      searchBtn.disabled = true;
      searchBtn.innerHTML = '<span class="spinner">⏳</span> جاري البحث...';

      setTimeout(() => {
        searchBtn.disabled = false;
        searchBtn.innerHTML = '🔍 بحث عن المسار';

        // فلترة أو إرجاع نتائج
        let results = roadsData.filter(r =>
          r.from.includes(fromVal) || r.to.includes(toVal) ||
          r.from.includes(toVal) || r.to.includes(fromVal)
        );

        if (results.length === 0) {
          results = roadsData.slice(0, 3);
        }

        renderSearchResults(results);
      }, 1200);
    });
  }

  const renderSearchResults = (results) => {
    if (!resultsContainer) return;

    const statusMap = {
      safe:    { class: 'badge-safe',    icon: '✅', color: '#00e676' },
      warning: { class: 'badge-warning', icon: '⚠️', color: '#ffd740' },
      danger:  { class: 'badge-danger',  icon: '🚨', color: '#ff4b4b' },
      closed:  { class: 'badge-closed',  icon: '🚫', color: '#9e9e9e' }
    };

    resultsContainer.innerHTML = `
      <h4 style="margin-bottom:1rem;font-size:0.95rem;color:var(--text-secondary)">
        📍 تم العثور على ${results.length} مسار
      </h4>
      ${results.map((r, i) => {
        const s = statusMap[r.status] || statusMap.safe;
        return `
          <div class="route-result-card animate-in" style="animation-delay:${i*0.1}s">
            <div class="route-result-header">
              <div class="route-cities">
                <span>${r.from}</span>
                <span class="arrow">←</span>
                <span>${r.to}</span>
              </div>
              <span class="badge ${s.class}">
                <span class="status-dot ${r.status}"></span>
                ${r.statusText}
              </span>
            </div>
            <div style="font-size:0.8rem;color:var(--text-muted);margin-top:4px">عبر: ${r.via}</div>
            <div class="route-meta">
              <div class="route-meta-item">
                <span class="rm-label">📏 المسافة</span>
                <span class="rm-value">${r.distance}</span>
              </div>
              <div class="route-meta-item">
                <span class="rm-label">⏱ الوقت المتوقع</span>
                <span class="rm-value">${r.time}</span>
              </div>
              <div style="margin-right:auto">
                <button class="btn-outline-green" onclick="showToast('🗺️ جاري عرض تفاصيل الطريق...', 'info')">
                  عرض التفاصيل
                </button>
              </div>
            </div>
          </div>
        `;
      }).join('')}
    `;

    // تفعيل animations
    setTimeout(() => {
      resultsContainer.querySelectorAll('.animate-in').forEach(el => el.classList.add('visible'));
    }, 50);
  };

  /* ==========================================
     نظام التوست (الإشعارات)
     ========================================== */
  window.showToast = (msg, type = 'info') => {
    const existing = document.querySelector('.toast');
    if (existing) existing.remove();

    const colors = {
      info:    'var(--green-main)',
      warning: 'var(--accent-yellow)',
      error:   'var(--accent-red)',
      success: 'var(--green-main)'
    };

    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.style.cssText = `
      position:fixed; bottom:2rem; right:50%; transform:translateX(50%);
      background:var(--bg-card); border:1px solid ${colors[type]};
      border-radius:10px; padding:12px 20px; z-index:9999;
      font-size:0.9rem; color:var(--text-primary);
      box-shadow:0 8px 30px rgba(0,0,0,0.4);
      animation:fadeInUp 0.3s ease; white-space:nowrap;
      font-family:'Cairo',sans-serif;
    `;
    toast.textContent = msg;
    document.body.appendChild(toast);

    setTimeout(() => {
      toast.style.animation = 'fadeIn 0.3s ease reverse';
      setTimeout(() => toast.remove(), 300);
    }, 3000);
  };

  /* ==========================================
     نموذج التواصل
     ========================================== */
  const contactForm = document.querySelector('.contact-form');
  if (contactForm) {
    contactForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const btn = contactForm.querySelector('button[type="submit"]');
      btn.disabled = true;
      btn.textContent = '⏳ جاري الإرسال...';

      setTimeout(() => {
        btn.disabled = false;
        btn.textContent = 'إرسال الرسالة ✓';
        btn.style.background = 'linear-gradient(135deg,#00e676,#00b248)';
        showToast('✅ تم إرسال رسالتك بنجاح، سنرد عليك قريباً', 'success');
        contactForm.reset();

        setTimeout(() => {
          btn.textContent = 'إرسال الرسالة';
          btn.style.background = '';
        }, 3000);
      }, 1500);
    });
  }

  /* ==========================================
     نموذج إضافة بلاغ
     ========================================== */
  const reportForm = document.querySelector('.report-form');
  if (reportForm) {
    reportForm.addEventListener('submit', (e) => {
      e.preventDefault();
      closeModal();
      showToast('✅ تم إرسال بلاغك بنجاح، شكراً لمساهمتك!', 'success');
    });
  }

  /* ==========================================
     نموذج تسجيل الدخول
     ========================================== */
  const loginForm = document.querySelector('.login-form');
  if (loginForm) {
    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const btn = loginForm.querySelector('button[type="submit"]');
      btn.disabled = true;
      btn.textContent = '⏳ جاري التحقق...';

      setTimeout(() => {
        btn.disabled = false;
        btn.textContent = 'تسجيل الدخول';
        showToast('✅ تم تسجيل الدخول بنجاح!', 'success');

        setTimeout(() => {
          window.location.href = 'index.html';
        }, 1000);
      }, 1500);
    });

    // إظهار/إخفاء كلمة المرور
    const togglePwd = document.querySelector('.input-toggle');
    const pwdInput  = document.querySelector('#password');

    if (togglePwd && pwdInput) {
      togglePwd.addEventListener('click', () => {
        const isText = pwdInput.type === 'text';
        pwdInput.type = isText ? 'password' : 'text';
        togglePwd.textContent = isText ? '👁' : '🙈';
      });
    }
  }

  /* ==========================================
     أشرطة التقدم - Dashboard
     ========================================== */
  const progressBars = document.querySelectorAll('.progress-fill');
  if (progressBars.length) {
    setTimeout(() => {
      progressBars.forEach(bar => {
        const width = bar.dataset.width || '70';
        bar.style.width = width + '%';
      });
    }, 300);
  }

  /* ==========================================
     تأثيرات الخريطة التجريبية - roads.html
     ========================================== */
  const mapDots = document.querySelectorAll('.map-city-dot');
  mapDots.forEach(dot => {
    dot.addEventListener('mouseenter', () => {
      const tooltip = dot.querySelector('.map-tooltip');
      if (tooltip) tooltip.style.display = 'block';
    });
    dot.addEventListener('mouseleave', () => {
      const tooltip = dot.querySelector('.map-tooltip');
      if (tooltip) tooltip.style.display = 'none';
    });
  });

  /* ==========================================
     الساعة الحية - للـ dashboard
     ========================================== */
  const liveClock = document.querySelector('.live-clock');
  if (liveClock) {
    const updateClock = () => {
      const now = new Date();
      liveClock.textContent = now.toLocaleTimeString('ar-LY');
    };
    updateClock();
    setInterval(updateClock, 1000);
  }

  /* ==========================================
     تهيئة الصفحة - Smooth entrance
     ========================================== */
  // إظهار الصفحة بشكل سلس بعد تحميل كامل
  requestAnimationFrame(() => {
    document.body.style.opacity = '1';
  });

});

</script>
  <script>
    /* ===== تبديل التبويبات ===== */
    function switchTab(tab) {
      const loginForm    = document.getElementById('loginForm');
      const registerForm = document.getElementById('registerForm');
      const loginTab     = document.getElementById('loginTab');
      const registerTab  = document.getElementById('registerTab');

      if (tab === 'login') {
        loginForm.style.display    = 'block';
        registerForm.style.display = 'none';
        loginTab.classList.add('active');
        registerTab.classList.remove('active');
        loginForm.classList.add('form-slide-in');
        setTimeout(() => loginForm.classList.remove('form-slide-in'), 300);
      } else {
        loginForm.style.display    = 'none';
        registerForm.style.display = 'block';
        loginTab.classList.remove('active');
        registerTab.classList.add('active');
        registerForm.classList.add('form-slide-in');
        setTimeout(() => registerForm.classList.remove('form-slide-in'), 300);
      }
    }

    /* ===== معالجة التسجيل ===== */
    function handleRegister(e) {
      e.preventDefault();
      const btn = e.target.querySelector('button[type="submit"]');
      btn.disabled = true;
      btn.textContent = '⏳ جاري إنشاء الحساب...';

      setTimeout(() => {
        showToast('🎉 تم إنشاء حسابك بنجاح! مرحباً بك في SafeRoad Libya', 'success');
        btn.disabled = false;
        btn.textContent = '✨ إنشاء الحساب مجاناً';
        setTimeout(() => { window.location.href = 'index.html'; }, 1500);
      }, 1800);
    }

    /* ===== مؤشر قوة كلمة المرور ===== */
    function checkPasswordStrength(pwd) {
      const fill = document.getElementById('strengthFill');
      const text = document.getElementById('strengthText');

      let strength = 0;
      if (pwd.length >= 8)              strength++;
      if (/[A-Z]/.test(pwd))            strength++;
      if (/[0-9]/.test(pwd))            strength++;
      if (/[^A-Za-z0-9]/.test(pwd))     strength++;

      const levels = [
        { w: '0%',   c: 'transparent', t: 'أدخل كلمة مرور' },
        { w: '25%',  c: '#ff4b4b',     t: '⚠️ ضعيفة جداً' },
        { w: '50%',  c: '#ff9800',     t: '⚡ مقبولة' },
        { w: '75%',  c: '#ffd740',     t: '👍 جيدة' },
        { w: '100%', c: '#00e676',     t: '✅ قوية جداً' },
      ];

      const lvl = levels[strength] || levels[0];
      fill.style.width      = lvl.w;
      fill.style.background = lvl.c;
      text.textContent      = lvl.t;
      text.style.color      = lvl.c;
    }

    /* ===== جسيمات الخلفية ===== */
    (function createParticles() {
      const container = document.getElementById('particles');
      for (let i = 0; i < 30; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left          = Math.random() * 100 + '%';
        p.style.animationDuration = (Math.random() * 8 + 6) + 's';
        p.style.animationDelay    = (Math.random() * 8) + 's';
        p.style.width  = (Math.random() * 3 + 1) + 'px';
        p.style.height = p.style.width;
        container.appendChild(p);
      }
    })();
  </script>
